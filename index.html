<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AcadVet USAM — Sistema de Gestión Académica Veterinaria">
  <title>AcadVet USAM</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/views.css">
</head>

<body class="login-page">

  <!-- Blobs decorativos de fondo -->
  <div class="bg-blob bg-blob--purple" aria-hidden="true"></div>
  <div class="bg-blob bg-blob--cyan"   aria-hidden="true"></div>
  <div class="bg-blob bg-blob--coral"  aria-hidden="true"></div>

  <!-- Card de login -->
  <main class="login-card" role="main">

    <!-- Branding -->
    <div class="login-brand">
      <div class="login-logo">
        <img src="logo/logo.png" alt="Logo Universidad de San Miguel">
      </div>

      <div>
        <h1 class="login-title">
          Acad<span class="title-highlight">Vet</span>
          <span class="title-highlight">USAM</span>
        </h1>
        <p class="login-subtitle">
          Facultad de Medicina Veterinaria
        </p>
      </div>
    </div>

    <!-- Formulario PIN -->
    <section class="login-form" aria-label="Formulario de acceso">

      <!-- Selector de rol -->
      <div class="login-role-tabs" id="roleTabs">
        <button class="login-role-tab active" data-role="docente" type="button">Docente</button>
        <button class="login-role-tab" data-role="eps" type="button">EPS</button>
      </div>

      <p class="pin-label" id="pinInstructions">
        Ingresá tu PIN de acceso
      </p>

      <!-- Dots visuales del PIN -->
      <!-- El input real va DENTRO y cubre los dots (tamaño real, transparente).
           Un input oculto de 1px hacía que teclados Android desordenaran las
           teclas; con tamaño real el teclado sigue bien el cursor. -->
      <div
        class="pin-dots"
        id="pinDots"
        role="group"
        aria-labelledby="pinInstructions"
        aria-describedby="pinError"
      >
        <span class="pin-dot" aria-hidden="true"></span>
        <span class="pin-dot" aria-hidden="true"></span>
        <span class="pin-dot" aria-hidden="true"></span>
        <span class="pin-dot" aria-hidden="true"></span>
        <span class="pin-dot" aria-hidden="true"></span>
        <span class="pin-dot" aria-hidden="true"></span>
        <input
          type="text"
          id="pinInput"
          class="pin-input-real"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="6"
          name="acadvet-pin"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          data-form-type="other"
          data-lpignore="true"
          data-1p-ignore="true"
          aria-label="PIN de acceso"
          aria-describedby="pinError"
        >
      </div>

      <!-- Mensaje de error -->
      <p class="pin-error" id="pinError" role="alert" aria-live="assertive"></p>

      <!-- Botón ingresar -->
      <button
        class="btn btn--primary btn--full login-btn"
        id="btnLogin"
        disabled
        type="button"
      >
        <span class="btn-text">Ingresar</span>
        <span aria-hidden="true">→</span>
      </button>

    </section>

    <!-- Footer -->
    <p class="login-footer">
      Docente: Lic. Óscar González &nbsp;·&nbsp; USAM
    </p>

  </main>

  <!-- Scripts (type="module" para ES imports) -->
  <!-- El ?v fuerza descarga fresca cuando cambia el login (evita caché vieja) -->
  <script type="module" src="js/auth.js?v=20260714d"></script>

</body>
</html>
