<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería de Microscopía — AcadVet USAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:#6C63FF; --primary-light:#A29BFE; --accent:#00D2D3;
      --success:#00B894; --danger:#FF6B6B; --warning:#FDCB6E;
      --bg:#F0F2FF; --surface:#FFFFFF; --surface-2:#ECEEFF;
      --text:#1A1A2E; --text-2:#4A4A6A; --text-muted:#8888AA;
      --border:rgba(108,99,255,0.15);
      --radius-sm:6px; --radius-md:12px; --radius-lg:20px; --radius-full:9999px;
      --font-d:'Poppins',sans-serif; --font-b:'Inter',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:48px}

    .app-header{background:var(--surface);border-bottom:2px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
    .logo{font-size:1.5rem}
    .app-header h1{font-family:var(--font-d);font-size:1rem;font-weight:700;color:var(--primary);line-height:1.2}
    .app-header h1 span{display:block;font-size:0.7rem;font-weight:500;color:var(--text-muted)}

    /* ── Search + filter bar ── */
    .filter-bar{position:sticky;top:56px;z-index:15;background:var(--bg);padding:10px 16px;border-bottom:1px solid var(--border)}
    .search-input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-full);font-family:var(--font-b);font-size:0.88rem;color:var(--text);background:var(--surface);outline:none;transition:border-color 0.15s}
    .search-input:focus{border-color:var(--primary)}
    .cat-tabs{display:flex;gap:6px;overflow-x:auto;padding:8px 0 2px;scrollbar-width:none}
    .cat-tabs::-webkit-scrollbar{display:none}
    .cat-tab{padding:6px 14px;border-radius:var(--radius-full);border:2px solid var(--border);background:var(--surface);font-family:var(--font-d);font-weight:600;font-size:0.75rem;color:var(--text-2);cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0}
    .cat-tab.active{background:var(--primary);border-color:var(--primary);color:#fff}

    /* ── Image grid ── */
    .content{padding:14px 14px;max-width:720px;margin:0 auto}
    .img-count{font-size:0.72rem;color:var(--text-muted);font-weight:600;margin-bottom:10px}
    .img-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    @media(min-width:500px){.img-grid{grid-template-columns:repeat(3,1fr)}}

    .img-card{background:var(--surface);border-radius:var(--radius-md);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:box-shadow 0.15s,transform 0.15s;-webkit-tap-highlight-color:transparent}
    .img-card:hover{box-shadow:0 4px 16px rgba(108,99,255,0.15);transform:translateY(-2px)}
    .img-thumb{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--surface-2)}
    .img-thumb-placeholder{width:100%;aspect-ratio:4/3;background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--text-muted)}
    .img-info{padding:8px 10px}
    .img-name{font-family:var(--font-d);font-weight:700;font-size:0.78rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .img-cat-chip{display:inline-block;padding:2px 8px;border-radius:var(--radius-full);font-size:0.62rem;font-weight:700;margin-top:4px}

    .empty-state{text-align:center;padding:52px 24px;grid-column:1/-1}
    .empty-icon{font-size:2.8rem;margin-bottom:12px}
    .empty-title{font-family:var(--font-d);font-weight:700;font-size:1rem;color:var(--text-2);margin-bottom:6px}
    .empty-text{font-size:0.82rem;color:var(--text-muted)}

    .loader{text-align:center;padding:48px;color:var(--text-muted);grid-column:1/-1}
    .spinner{width:32px;height:32px;border:3px solid rgba(108,99,255,0.2);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Image modal ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto}
    .modal-overlay.hidden{display:none}
    .modal-topbar{width:100%;max-width:640px;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
    .btn-modal-close{width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.1);color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .modal-title-text{font-family:var(--font-d);font-weight:700;font-size:0.95rem;color:#fff;flex:1}
    .modal-img-wrap{width:100%;max-width:640px;padding:0 16px;flex-shrink:0}
    .modal-img{width:100%;border-radius:var(--radius-md);display:block;max-height:70vh;object-fit:contain;background:#000}
    .modal-details{width:100%;max-width:640px;padding:14px 16px 24px;color:#fff}
    .modal-cat-chip{display:inline-block;padding:4px 12px;border-radius:var(--radius-full);font-size:0.72rem;font-weight:700;margin-bottom:10px}
    .modal-desc{font-size:0.88rem;line-height:1.5;color:rgba(255,255,255,0.85);margin-bottom:6px}
    .modal-tags{font-size:0.75rem;color:rgba(255,255,255,0.55)}

    .hidden{display:none!important}
  </style>
</head>
<body>

  <header class="app-header">
    <div class="logo">🔬</div>
    <h1>Galería de Microscopía<span>Imágenes de referencia para laboratorio</span></h1>
  </header>

  <div class="filter-bar">
    <input type="search" class="search-input" id="searchInput" placeholder="Buscar imagen…">
    <div class="cat-tabs" id="catTabs"></div>
  </div>

  <div class="content">
    <div class="img-count" id="imgCount"></div>
    <div class="img-grid" id="imgGrid">
      <div class="loader"><div class="spinner"></div>Cargando galería…</div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal-topbar">
      <button class="btn-modal-close" id="btnModalClose">✕</button>
      <div class="modal-title-text" id="modalTitleText"></div>
    </div>
    <div class="modal-img-wrap">
      <img class="modal-img" id="modalImg" src="" alt="">
    </div>
    <div class="modal-details">
      <div class="modal-cat-chip" id="modalCatChip"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-tags" id="modalTags"></div>
    </div>
  </div>

  <script type="module">
    import { listenGallery, GALLERY_CATEGORIES } from './js/image-gallery.js';

    let _all      = [];
    let _activeCategory = 'todos';
    let _searchQuery    = '';

    // ── Category tabs ─────────────────────────────────────────────────────
    const allCats = [{ id:'todos', label:'Todos', color:'#6C63FF' }, ...GALLERY_CATEGORIES];
    document.getElementById('catTabs').innerHTML = allCats.map(c => `
      <button class="cat-tab ${c.id === 'todos' ? 'active' : ''}" data-cat="${c.id}">${c.label}</button>
    `).join('');

    document.querySelectorAll('.cat-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        _activeCategory = btn.dataset.cat;
        renderGrid();
      });
    });

    // ── Search ────────────────────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', e => {
      _searchQuery = e.target.value.toLowerCase().trim();
      renderGrid();
    });

    // ── Load gallery ──────────────────────────────────────────────────────
    listenGallery(images => {
      _all = images;
      renderGrid();
    });

    function renderGrid() {
      const filtered = _all.filter(img => {
        const matchCat = _activeCategory === 'todos' || img.category === _activeCategory;
        const q = _searchQuery;
        const matchSearch = !q
          || img.name?.toLowerCase().includes(q)
          || img.tags?.toLowerCase().includes(q)
          || img.desc?.toLowerCase().includes(q);
        return matchCat && matchSearch;
      });

      document.getElementById('imgCount').textContent =
        `${filtered.length} imagen${filtered.length !== 1 ? 'es' : ''}`;

      if (filtered.length === 0) {
        document.getElementById('imgGrid').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div class="empty-title">${_all.length === 0 ? 'Galería vacía' : 'Sin resultados'}</div>
            <div class="empty-text">${_all.length === 0
              ? 'El docente aún no ha subido imágenes de referencia.'
              : 'Probá con otro término de búsqueda o categoría.'}</div>
          </div>`;
        return;
      }

      document.getElementById('imgGrid').innerHTML = filtered.map(img => {
        const cat  = GALLERY_CATEGORIES.find(c => c.id === img.category);
        const color = cat?.color ?? '#6C63FF';
        return `
          <div class="img-card" data-id="${esc(img.id)}">
            ${img.url
              ? `<img class="img-thumb" src="${esc(img.url)}" alt="${esc(img.name)}" loading="lazy" onerror="this.parentElement.querySelector('.img-thumb-placeholder').style.display='flex';this.style.display='none'">`
              : ''}
            <div class="img-thumb-placeholder" style="${img.url ? 'display:none' : ''}">🔬</div>
            <div class="img-info">
              <div class="img-name">${esc(img.name)}</div>
              <div class="img-cat-chip" style="background:${color}20;color:${color}">${esc(cat?.label ?? img.category)}</div>
            </div>
          </div>`;
      }).join('');

      document.querySelectorAll('.img-card').forEach(card => {
        card.addEventListener('click', () => openModal(card.dataset.id));
      });
    }

    // ── Modal ─────────────────────────────────────────────────────────────
    function openModal(id) {
      const img = _all.find(i => i.id === id);
      if (!img) return;
      const cat   = GALLERY_CATEGORIES.find(c => c.id === img.category);
      const color = cat?.color ?? '#6C63FF';

      document.getElementById('modalImg').src          = img.url || '';
      document.getElementById('modalTitleText').textContent = img.name || '';
      document.getElementById('modalCatChip').textContent   = cat?.label ?? img.category;
      document.getElementById('modalCatChip').style.cssText =
        `background:${color}33;color:${color}`;
      document.getElementById('modalDesc').textContent  = img.desc || '';
      document.getElementById('modalTags').textContent  = img.tags ? `🏷️ ${img.tags}` : '';

      document.getElementById('modalOverlay').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.add('hidden');
      document.body.style.overflow = '';
    }

    document.getElementById('btnModalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
