<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evaluaciones — AcadVet USAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:#6C63FF; --primary-light:#A29BFE; --accent:#00D2D3;
      --success:#00B894; --danger:#FF6B6B; --warning:#FDCB6E;
      --bg:#F0F2FF; --surface:#FFFFFF; --surface-2:#ECEEFF;
      --text:#1A1A2E; --text-2:#4A4A6A; --text-muted:#8888AA;
      --border:rgba(108,99,255,0.15);
      --radius-sm:6px; --radius-md:12px; --radius-lg:20px; --radius-full:9999px;
      --font-d:'Poppins',sans-serif; --font-b:'Inter',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:48px}

    .app-header{background:var(--surface);border-bottom:2px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
    .logo{font-size:1.5rem}
    .app-header h1{font-family:var(--font-d);font-size:1rem;font-weight:700;color:var(--primary);line-height:1.2}
    .app-header h1 span{display:block;font-size:0.7rem;font-weight:500;color:var(--text-muted)}

    .content{max-width:480px;margin:0 auto;padding:20px 16px}

    .today-banner{background:linear-gradient(135deg,var(--primary) 0%,var(--accent) 100%);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:20px;color:#fff;display:flex;align-items:center;gap:14px}
    .banner-icon{font-size:1.8rem;flex-shrink:0}
    .banner-date{font-family:var(--font-d);font-weight:800;font-size:0.95rem;line-height:1.3}
    .banner-sub{font-size:0.7rem;opacity:0.8;margin-top:3px}

    .section-label{font-family:var(--font-d);font-weight:700;font-size:0.85rem;color:var(--text-2);margin-bottom:10px;display:flex;align-items:center;gap:6px}

    .reminder-card{background:var(--surface);border-radius:var(--radius-md);border:1px solid var(--border);border-left:4px solid var(--primary);padding:14px 14px 14px 12px;margin-bottom:10px;display:flex;gap:12px;transition:box-shadow 0.15s}
    .reminder-card:hover{box-shadow:0 2px 12px rgba(108,99,255,0.1)}
    .reminder-card.past{opacity:0.55}
    .date-col{min-width:50px;text-align:center;flex-shrink:0}
    .date-day{font-family:var(--font-d);font-weight:800;font-size:1.6rem;color:var(--text);line-height:1}
    .date-month{font-size:0.68rem;color:var(--text-muted);text-transform:uppercase;font-weight:600;letter-spacing:0.05em}
    .date-tag{display:inline-block;padding:2px 7px;border-radius:var(--radius-full);font-size:0.58rem;font-weight:700;margin-top:5px;white-space:nowrap}
    .rem-body{flex:1;min-width:0}
    .rem-title{font-family:var(--font-d);font-weight:700;font-size:0.9rem;color:var(--text);margin-bottom:3px}
    .rem-subject{font-size:0.72rem;color:var(--text-2);font-weight:600;margin-bottom:5px}
    .rem-message{font-size:0.8rem;color:var(--text-2);line-height:1.45}

    .sep{height:1px;background:var(--border);margin:20px 0 16px}

    .empty-state{text-align:center;padding:52px 24px}
    .empty-icon{font-size:3rem;margin-bottom:14px}
    .empty-title{font-family:var(--font-d);font-weight:700;font-size:1.05rem;color:var(--text-2);margin-bottom:6px}
    .empty-text{font-size:0.85rem;color:var(--text-muted)}

    .loader{text-align:center;padding:48px;color:var(--text-muted);font-size:0.9rem}
    .spinner{width:32px;height:32px;border:3px solid rgba(108,99,255,0.2);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}

    .hidden{display:none!important}
  </style>
</head>
<body>

  <header class="app-header">
    <div class="logo">🔔</div>
    <h1>Avisos<span>Evaluaciones y recordatorios</span></h1>
  </header>

  <div class="content">

    <div class="today-banner">
      <div class="banner-icon">📅</div>
      <div>
        <div class="banner-date" id="bannerDate">Cargando…</div>
        <div class="banner-sub">AcadVet USAM · Fac. Medicina Veterinaria</div>
      </div>
    </div>

    <div id="loader" class="loader">
      <div class="spinner"></div>
      Cargando avisos…
    </div>

    <div id="upcomingSection" class="hidden">
      <div class="section-label">📅 Próximas evaluaciones</div>
      <div id="upcomingList"></div>
    </div>

    <div id="pastSection" class="hidden">
      <div class="sep"></div>
      <div class="section-label">🕐 Recientes (últimos 7 días)</div>
      <div id="pastList"></div>
    </div>

    <div id="emptyState" class="hidden empty-state">
      <div class="empty-icon">🔕</div>
      <div class="empty-title">Sin avisos por ahora</div>
      <div class="empty-text">El docente publicará evaluaciones y recordatorios aquí.</div>
    </div>

  </div>

  <script type="module">
    import { listenReminders, REMINDER_COLORS } from './js/reminders.js';

    const today    = new Date();
    const todayStr = today.toISOString().slice(0, 10);

    document.getElementById('bannerDate').textContent = today.toLocaleDateString('es-SV', {
      weekday:'long', year:'numeric', month:'long', day:'numeric',
    }).replace(/^\w/, c => c.toUpperCase());

    listenReminders(reminders => {
      document.getElementById('loader').classList.add('hidden');

      const past7 = new Date(today);
      past7.setDate(past7.getDate() - 7);
      const past7Str = past7.toISOString().slice(0, 10);

      const upcoming = reminders.filter(r => r.date >= todayStr);
      const past     = reminders.filter(r => r.date >= past7Str && r.date < todayStr);

      if (!upcoming.length && !past.length) {
        document.getElementById('emptyState').classList.remove('hidden');
        return;
      }

      if (upcoming.length) {
        document.getElementById('upcomingSection').classList.remove('hidden');
        document.getElementById('upcomingList').innerHTML = upcoming.map(r => cardHtml(r, false)).join('');
      }

      if (past.length) {
        document.getElementById('pastSection').classList.remove('hidden');
        document.getElementById('pastList').innerHTML =
          [...past].reverse().slice(0, 5).map(r => cardHtml(r, true)).join('');
      }
    });

    const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

    function cardHtml(r, isPast) {
      const [yr, mo, dy] = r.date.split('-').map(Number);
      const dt   = new Date(yr, mo - 1, dy);
      const diff = Math.round((dt - new Date(todayStr)) / 86400000);

      const tagText = diff === 0 ? 'HOY'
                    : diff === 1 ? 'MAÑANA'
                    : diff > 1  ? `EN ${diff}D`
                    : diff === -1 ? 'AYER'
                    : `HACE ${Math.abs(diff)}D`;

      const color = REMINDER_COLORS[r.color] || REMINDER_COLORS.purple;
      const alpha = color + '22';

      return `
        <div class="reminder-card ${isPast ? 'past' : ''}" style="border-left-color:${color}">
          <div class="date-col">
            <div class="date-day">${dy}</div>
            <div class="date-month">${MONTHS[mo-1]}</div>
            <div class="date-tag" style="background:${alpha};color:${color}">${tagText}</div>
          </div>
          <div class="rem-body">
            <div class="rem-title">${esc(r.title)}</div>
            ${r.subject ? `<div class="rem-subject">📚 ${esc(r.subject)}</div>` : ''}
            ${r.message ? `<div class="rem-message">${esc(r.message)}</div>` : ''}
          </div>
        </div>`;
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
