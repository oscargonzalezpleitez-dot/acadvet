<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyector Grupos — AcadVet USAM</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #0B0D1A;
      color: #F0F2FF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    .proy-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 36px 16px;
      border-bottom: 1px solid rgba(108,99,255,.2);
      flex-shrink: 0;
    }
    .proy-logo { display: flex; align-items: center; gap: 12px; }
    .proy-logo-icon { font-size: 2rem; }
    .proy-logo-text { font-size: 1.1rem; font-weight: 700; color: #A29BFE; letter-spacing: .05em; }
    .proy-materia   { font-size: 1.3rem; font-weight: 700; color: #F0F2FF; max-width: 55vw;
                      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .proy-fecha     { font-size: .9rem; color: #8888AA; }

    .proy-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 1.2rem;
      color: #8888AA;
      overflow: hidden;
    }

    /* Sorteando */
    .gp-dice   { font-size: 6rem; animation: gpSpin 1.1s ease-in-out infinite; }
    @keyframes gpSpin {
      0%, 100% { transform: rotate(-14deg) scale(1); }
      50%      { transform: rotate(14deg) scale(1.1); }
    }
    .gp-sorteando-title { font-size: 2rem; font-weight: 700; color: #F0F2FF; }
    .gp-sorteando-name   { font-size: 1.4rem; font-weight: 600; color: #6C63FF; min-height: 2em; }

    /* Resultado */
    .gp-results {
      flex: 1;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      padding: 28px 36px;
      overflow-y: auto;
      align-content: start;
    }
    .gp-card {
      background: #12142A;
      border: 1.5px solid rgba(108,99,255,.3);
      border-radius: 18px;
      padding: 20px 22px;
      animation: gpCardIn 380ms ease backwards;
    }
    @keyframes gpCardIn {
      from { opacity: 0; transform: scale(.9) translateY(14px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .gp-card__title {
      font-size: 1.15rem;
      font-weight: 800;
      color: #A29BFE;
      margin-bottom: 10px;
    }
    .gp-card__member {
      font-size: 1.35rem;
      font-weight: 600;
      color: #F0F2FF;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .gp-card__member:last-child { border-bottom: none; }

    .proy-statusbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 36px;
      border-top: 1px solid rgba(108,99,255,.2);
      flex-shrink: 0;
    }
    .proy-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #00B894;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    .proy-status-text { font-size: .85rem; color: #8888AA; }
  </style>
</head>

<body>
  <header class="proy-header">
    <div class="proy-logo">
      <div class="proy-logo-icon">🐾</div>
      <div class="proy-logo-text">AcadVet USAM</div>
    </div>
    <div style="text-align:right">
      <div class="proy-materia" id="proyMateria">Cargando…</div>
      <div class="proy-fecha"   id="proyFecha"></div>
    </div>
  </header>

  <div id="mainLoading" class="proy-center">
    <div>⏳ Conectando con el sorteo…</div>
  </div>

  <div id="mainError" class="proy-center" style="display:none">
    <div>❌</div>
    <div id="errTxt">El sorteo no está disponible.</div>
  </div>

  <div id="mainContent" style="display:none;flex:1;overflow:hidden"></div>

  <footer class="proy-statusbar">
    <div class="proy-dot" id="proyDot" style="background:#8888AA"></div>
    <span class="proy-status-text" id="proyStatusTxt">Conectando…</span>
  </footer>

  <script type="module" src="js/proyector-grupos.js"></script>
</body>
</html>
